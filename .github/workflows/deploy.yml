# Сборка Astro и публикация на GitHub Pages при пуше в main.
# Официальный путь GitHub: собираем артефакт и деплоим через actions/deploy-pages.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Позволяет запустить деплой вручную из вкладки Actions.
  workflow_dispatch:

# Права, нужные для публикации на Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Одновременно - только один деплой; новый пуш отменяет предыдущий незавершённый.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
